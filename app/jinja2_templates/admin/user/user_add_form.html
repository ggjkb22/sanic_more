<h2 class="contentTitle">添加用户</h2>

<div class="pageContent">
	
	<form method="post" action="{{ request.url_for('admin.user_add') }}" class="pageForm required-validate" onsubmit="return validateCallback(this, navTabAjaxDone)">
		<div class="pageFormContent nowrap" layoutH="97">
			<dl>
				<dt>用户名：</dt>
				<dd>
					<input type="text" name="username" maxlength="20" class="required" />
				</dd>
			</dl>
            <dl>
				<dt>密码：</dt>
				<dd>
					<input id="w_validation_pwd" type="password" name="password" class="required" minlength="{{ min_psw }}" maxlength="{{ max_psw }}" alt="大小写字母、数字、特殊字符 {{ min_psw }}-{{ max_psw }}位"/>
				</dd>
			</dl>
			<dl>
				<dt>确认密码：</dt>
				<dd>
					<input type="password" name="repassword" class="required" equalto="#w_validation_pwd"/>
				</dd>
			</dl>
            <dl>
				<dt>描述：</dt>
				<dd>
                    <textarea name="description" class="textInput" cols="80" rows=6></textarea>
				</dd>
			</dl>
			<dl>
				<dt>是否可用：</dt>
				<dd>
                    <select name="can_use" class="required combox">
                        <option value="1" selected>是</option>
                        <option value="0" >否</option>
                    </select>
				</dd>
			</dl>
            <dl>
				<dt>角色：</dt>
				<dd>
					<div class="accordion" style="width:500px;float:left;">
						<div class="accordionHeader">
							<h2><span>icon</span>角色列表</h2>
						</div>
						<div class="accordionContent">
							<ul class="tree treeFolder treeCheck">
                                {% for role in roles %}
								<li><a tname="roles" tvalue="{{ role['id'] }}" title="{{ role['name'] }}">{{ role['name'] }}</a></li>
								{% endfor %}
							</ul>
						</div>
					</div>
				</dd>
			</dl>
		</div>
		<div class="formBar">
			<ul>
				<li><div class="buttonActive"><div class="buttonContent"><button type="submit">提交</button></div></div></li>
				<li><div class="button"><div class="buttonContent"><button type="button" class="close">取消</button></div></div></li>
			</ul>
		</div>
	</form>
	
</div>
