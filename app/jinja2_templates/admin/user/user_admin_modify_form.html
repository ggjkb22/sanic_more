<h2 class="contentTitle">修改指定用户信息</h2>
<div style="display:block; overflow:hidden; padding:0 10px; line-height:21px;">

    <div class="tabs">
        <div class="tabsHeader">
            <div class="tabsHeaderContent">
                <ul>
                    <li class="selected"><a href="javascript:;"><span>信息</span></a></li>
                    <li><a href="javascript:;"><span>密码</span></a></li>
                </ul>
            </div>
        </div>
        <div class="tabsContent">
            <div>
                <form method="post" action="{{ request.url_for('admin.user_info_admin_modify') }}"
                      class="pageForm required-validate" onsubmit="return validateCallback(this, navTabAjaxDone)">
                    <div class="pageFormContent nowrap" layoutH="150">
                        <dl>
                            <dt>用户ID：</dt>
                            <dd>
                                <input type="text" name="user_id" value="{{ user.pk }}" class="textInput"
                                       readonly="true"/>
                            </dd>
                        </dl>
                        <dl>
                            <dt>用户名：</dt>
                            <dd>
                                <input type="text" name="username" maxlength="20" value="{{ user.username }}"
                                       class="textInput" readonly="true"/>
                            </dd>
                        </dl>
                        <dl>
                            <dt>描述：</dt>
                            <dd>
                                <textarea name="description" class="textInput" cols="80"
                                          rows=6>{{ user.description | default('', boolean=True) }}</textarea>
                            </dd>
                        </dl>
                        <dl>
                            <dt>是否可用：</dt>
                            <dd>
                                <select name="can_use" class="required combox">
                                    <option value="1" {% if user.can_use %}selected{% endif %}>是</option>
                                    <option value="0" {% if not user.can_use %}selected{% endif %}>否</option>
                                </select>
                            </dd>
                        </dl>
                        <dl>
                            <dt>角色：</dt>
                            <dd>
                                <div class="accordion" style="width:500px;float:left;margin:5px;">
                                    <div class="accordionHeader">
                                        <h2><span>icon</span>角色列表</h2>
                                    </div>
                                    <div class="accordionContent">
                                        <ul class="tree treeFolder treeCheck">
                                            {% for role in roles %}
                                            <li><a tname="roles" tvalue="{{ role['id'] }}" {% if role['id'] in current_user_roles %}checked="true"{% endif %}>{{ role['name'] }}</a></li>
                                            {% endfor %}
                                        </ul>
                                    </div>
                                </div>
                            </dd>
                        </dl>
                    </div>
                    <div class="formBar">
                        <ul>
                            <li>
                                <div class="buttonActive">
                                    <div class="buttonContent">
                                        <button type="submit">提交</button>
                                    </div>
                                </div>
                            </li>
                            <li>
                                <div class="button">
                                    <div class="buttonContent">
                                        <button type="button" class="close">取消</button>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>

                </form>
            </div>

            <div>
                <form method="post" action="{{ request.url_for('admin.user_psw_admin_modify') }}"
                      class="pageForm required-validate" onsubmit="return validateCallback(this, navTabAjaxDone)">
                    <div class="pageFormContent nowrap">
                        <dl>
                            <dt>用户ID：</dt>
                            <dd>
                                <input type="text" name="user_id" value="{{ user.pk }}" class="textInput"
                                       readonly="true"/>
                            </dd>
                        </dl>
                        <dl>
                            <dt>用户名：</dt>
                            <dd>
                                <input type="text" name="username" maxlength="20" value="{{ user.username }}"
                                       class="textInput" readonly="true"/>
                            </dd>
                        </dl>
                        <dl>
                            <dt>新密码：</dt>
                            <dd>
                                <input id="w_validation_pwd" type="password" name="password" class="required"
                                       minlength="{{ min_psw }}" maxlength="{{ max_psw }}"
                                       alt="大小写字母、数字、特殊字符 {{ min_psw }}-{{ max_psw }}位"/>
                            </dd>
                        </dl>
                        <dl>
                            <dt>确认密码：</dt>
                            <dd>
                                <input type="password" name="repassword" class="required" equalto="#w_validation_pwd"/>
                            </dd>
                        </dl>
                    </div>
                    <div class="formBar">
                        <ul>
                            <li>
                                <div class="buttonActive">
                                    <div class="buttonContent">
                                        <button type="submit">提交</button>
                                    </div>
                                </div>
                            </li>
                            <li>
                                <div class="button">
                                    <div class="buttonContent">
                                        <button type="button" class="close">取消</button>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>
        </div>
        <div class="tabsFooter">
            <div class="tabsFooterContent"></div>
        </div>
    </div>
</div>
